name: Notion Competition Sync

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync competition data from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_COMPETITIONS_DATABASE_ID: ${{ secrets.NOTION_COMPETITIONS_DATABASE_ID }}
        run: npm run sync:competitions

      - name: Commit and push updated competition data
        run: |
          if git diff --quiet -- data/competition-data.ts; then
            echo "No competition data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/competition-data.ts
          git commit -m "chore: sync competition data from notion"
          git push
